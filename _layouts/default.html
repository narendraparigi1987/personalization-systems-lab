<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #16203a;
      --text: #eef2ff;
      --muted: #b6c2e2;
      --accent: #7c9cff;
      --accent-2: #8bdfc8;
      --border: rgba(255,255,255,.08);
      --code: #0f172a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 10% 0%, #17213f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow: auto;
      padding: 28px 20px;
      border-right: 1px solid var(--border);
      background: rgba(10,15,30,.72);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: block;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 8px;
    }
    .tagline { color: var(--muted); font-size: .94rem; margin-bottom: 18px; }
    .nav-group { margin: 18px 0 10px; }
    .nav-group h3 {
      margin: 18px 0 8px;
      font-size: .76rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nav-group a {
      display: block;
      padding: 9px 10px;
      margin: 4px 0;
      border-radius: 10px;
      color: var(--text);
      background: transparent;
    }
    .nav-group a:hover, .nav-group a.active {
      background: var(--panel-2);
      text-decoration: none;
    }
    .content {
      padding: 42px 32px 64px;
      max-width: 1100px;
    }
    .hero {
      background: linear-gradient(180deg, rgba(124,156,255,.14), rgba(139,223,200,.08));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
    }
    h1 { margin: 0 0 10px; line-height: 1.15; }
    h2 { margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px; }
    h3 { margin-top: 24px; }
    p, li { color: #dde5ff; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 18px 0 8px;
    }
    .card {
      border: 1px solid var(--border);
      background: rgba(17,24,45,.82);
      border-radius: 18px;
      padding: 18px;
    }
    .card h3 { margin-top: 0; }
    code, pre {
      font-family: SFMono-Regular, Consolas, Monaco, Menlo, monospace;
    }
    pre {
      background: var(--code);
      color: #dbe7ff;
      padding: 18px;
      border-radius: 16px;
      overflow: auto;
      border: 1px solid var(--border);
    }
    code { background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 8px; }
    ul.tight li { margin-bottom: 6px; }
    .checklist li { margin-bottom: 8px; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(124,156,255,.16);
      color: var(--text);
      margin-right: 8px;
      margin-bottom: 8px;
      font-size: .86rem;
    }
    .footer-note { margin-top: 34px; color: var(--muted); font-size: .95rem; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
      .content { padding: 24px 18px 56px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="tagline">A GitHub Pages style lab for search, recommendation, personalization, LLMs, and agentic AI.</div>
      {% include sidebar.html %}
    </aside>
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
